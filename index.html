
<!DOCTYPE html>
<html>
<head>
    <title>AI Productivity Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>AI-Powered Workplace Productivity Assistant</h1>

<h2>Email Generator</h2>
<textarea placeholder="Type your email request"></textarea>
<button>Generate Email</button>

<h2>Meeting Summarizer</h2>
<textarea placeholder="Paste meeting notes"></textarea>
<button>Summarize</button>

<h2>Task Planner</h2>
<textarea placeholder="Enter your tasks"></textarea>
<button>Create Plan</button>

<h2>Research Assistant</h2>
<input type="text" placeholder="Ask a question">
<button>Research</button>

<h2>Chatbot</h2>
<input type="text" placeholder="Type a message">
<button>Send</button>

<script src="script.js"></script>

</body>
</html>
